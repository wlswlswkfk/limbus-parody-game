<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>림버스 패러디</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/battle.css">
  <link rel="stylesheet" href="css/dungeon.css">
  <link rel="stylesheet" href="css/editor.css">
  <link rel="stylesheet" href="css/party.css">
</head>
<body>

  <!-- ═══════════════════════════════════════════════════════════ MAIN MENU -->
  <div id="screen-menu" class="screen active">
    <div class="menu-container">
      <h1 class="game-title">림버스 패러디</h1>
      <p class="game-subtitle">— 거울 속의 전쟁 —</p>

      <div class="menu-buttons">
        <button class="btn-primary"   id="btn-start">게임 시작</button>
        <button class="btn-secondary" id="btn-continue" disabled>이어하기</button>
        <button class="btn-secondary" id="btn-editor">데이터 편집기</button>
      </div>

      <div class="menu-decoration">
        <div class="deco-line"></div>
        <span class="deco-text">ver 1.0.0</span>
        <div class="deco-line"></div>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════ PARTY COMP -->
  <div id="screen-party" class="screen">
    <div class="screen-header">
      <h2>파티 구성</h2>
      <button class="btn-small btn-back" id="btn-party-back">← 돌아가기</button>
    </div>
    <div class="party-content">
      <div id="sinner-list" class="sinner-list"></div>
      <div class="party-panel">
        <h3>파티 슬롯 (최대 3명)</h3>
        <div id="party-slots" class="party-slots"></div>
        <button class="btn-primary" id="btn-confirm-party" disabled>던전 입장 →</button>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════ DUNGEON MAP -->
  <div id="screen-dungeon" class="screen">
    <div class="screen-header">
      <h2 id="dungeon-name">균열된 거울</h2>
      <div class="party-status" id="dungeon-party-status"></div>
      <button class="btn-small btn-back" id="btn-dungeon-back">포기</button>
    </div>

    <div class="dungeon-content">
      <canvas id="dungeon-canvas" width="800" height="620"></canvas>

      <div id="dungeon-event-modal" class="dungeon-modal hidden">
        <div class="modal-content">
          <h3 id="event-title">이벤트</h3>
          <p  id="event-description"></p>
          <div id="event-choices" class="event-choices"></div>
        </div>
      </div>

      <div id="dungeon-reward-modal" class="dungeon-modal hidden">
        <div class="modal-content">
          <h3>보상 획득!</h3>
          <div id="reward-content"></div>
          <button class="btn-primary" id="btn-reward-close">계속</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════ BATTLE -->
  <div id="screen-battle" class="screen">
    <div class="battle-header">
      <h2>전투</h2>
      <div id="battle-turn-indicator" class="turn-indicator">스킬 선택</div>
    </div>

    <!-- Canvas battle arena -->
    <div class="battle-arena">
      <canvas id="battle-canvas" class="battle-canvas"></canvas>

      <!-- Coin flip overlay (shown/hidden during coin phase) -->
      <div id="battle-coins-overlay" class="battle-coins-overlay hidden">
        <div id="coin-display" class="coin-display">
          <div class="coin-display-label">코인 플립 영역</div>
        </div>
      </div>

      <!-- Battle log (compact, shown as semi-transparent overlay) -->
      <div id="battle-log" class="battle-log-overlay"></div>

      <!-- Hidden HTML character containers (legacy fallback only) -->
      <div id="battle-party"   style="display:none"></div>
      <div id="battle-enemies" style="display:none"></div>
    </div>

    <div class="battle-controls">
      <div id="skill-selection" class="skill-selection">
        <span style="color:var(--text-secondary);font-size:0.85rem">스킬을 선택하세요...</span>
      </div>
      <button class="btn-primary" id="btn-battle-start" disabled>전투 시작</button>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════ RESULT -->
  <div id="screen-result" class="screen">
    <div class="result-container">
      <h2 id="result-title" class="result-title">결과</h2>
      <div id="result-stats"  class="result-stats"></div>
      <div class="result-buttons">
        <button class="btn-primary"   id="btn-result-continue">계속</button>
        <button class="btn-secondary" id="btn-result-menu">메인 메뉴</button>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════ EDITOR -->
  <div id="screen-editor" class="screen">
    <div class="screen-header">
      <h2>데이터 편집기</h2>
      <button class="btn-small btn-back" id="btn-editor-back">← 돌아가기</button>
    </div>

    <div class="editor-content">
      <!-- Tabs -->
      <div class="editor-tabs">
        <button class="tab-btn active" data-tab="characters">캐릭터</button>
        <button class="tab-btn"        data-tab="dungeon">던전</button>
        <button class="tab-btn"        data-tab="settings">설정</button>
        <button class="tab-btn"        data-tab="assets">에셋 관리</button>
      </div>

      <!-- Characters Tab -->
      <div id="editor-tab-characters" class="tab-content active">
        <div class="editor-toolbar">
          <button class="btn-small btn-primary" id="btn-add-sinner">+ 죄인 추가</button>
          <button class="btn-small"             id="btn-export-data">내보내기 (JSON)</button>
          <button class="btn-small"             id="btn-import-data">불러오기 (JSON)</button>
          <input type="file" id="import-file-input" accept=".json" style="display:none">
        </div>
        <div id="character-editor-list" class="editor-list"></div>
      </div>

      <!-- Dungeon Tab -->
      <div id="editor-tab-dungeon" class="tab-content">
        <div class="editor-toolbar">
          <button class="btn-small btn-primary" id="btn-add-node">+ 노드 추가</button>
        </div>
        <div id="dungeon-editor-list" class="editor-list"></div>
      </div>

      <!-- Settings Tab -->
      <div id="editor-tab-settings" class="tab-content">
        <div class="settings-form">
          <div class="form-group">
            <label>전투 배경 URL</label>
            <input type="text" id="setting-battle-bg"  placeholder="이미지 URL (선택사항)">
          </div>
          <div class="form-group">
            <label>던전 배경 URL</label>
            <input type="text" id="setting-dungeon-bg" placeholder="이미지 URL (선택사항)">
          </div>
          <div class="form-group">
            <label>BGM URL</label>
            <input type="text" id="setting-bgm-url"    placeholder="오디오 파일 URL (선택사항)">
          </div>
          <button class="btn-primary" id="btn-save-settings" style="max-width:200px">설정 저장</button>
        </div>
      </div>

      <!-- Asset Management Tab -->
      <div id="editor-tab-assets" class="tab-content">
        <div id="asset-manager-content" class="asset-manager-content">
          <p style="color:var(--text-secondary);font-size:0.85rem">에셋 관리 탭을 클릭하면 로드됩니다.</p>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════ NOTIFICATIONS -->
  <div id="notification-container"></div>

  <!-- Scripts (order matters: data → ui → audio → systems → main) -->
  <script src="js/data.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/asset-manager.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/sprite.js"></script>
  <script src="js/battle-renderer.js"></script>
  <script src="js/battle.js"></script>
  <script src="js/party.js"></script>
  <script src="js/dungeon.js"></script>
  <script src="js/editor.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
